<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — VidyaSetu</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(150deg, var(--green-900) 0%, var(--green-700) 50%, var(--teal-600) 100%);
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: var(--radius-xl);
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: var(--green-50);
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
    }

    .title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔑</div>
    <div class="title">Forgot Password?</div>
    <div class="subtitle">Enter your email and we'll send you a reset link</div>

    <div id="formAlert"></div>

    <div class="form-group" style="text-align:left;">
      <label class="form-label">Email Address</label>
      <div style="position:relative;">
        <span style="position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px;">📧</span>
        <input type="email" class="form-control" id="email"
          placeholder="Enter your registered email"
          style="padding-left:42px;"
          autocomplete="email">
      </div>
    </div>

    <button class="btn btn-primary btn-full btn-lg"
      onclick="sendResetLink()" id="resetBtn">
      Send Reset Link
    </button>

    <div style="text-align:center; margin-top:20px; font-size:14px; color:var(--text-mid);">
      Remember your password? <a href="/index"
        style="color:var(--green-700); font-weight:600;">Back to Login</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function showAlert(msg, type = 'error') {
      document.getElementById('formAlert').innerHTML =
        `<div class="alert alert-${type === 'error' ? 'error' : 'success'}">${msg}</div>`;
    }

    async function sendResetLink() {
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('resetBtn');

      if (!email) {
        showAlert('Please enter your email address.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (data.success) {
          showAlert('✅ Reset link sent to your email! Check your inbox.', 'success');
          btn.innerHTML = '✅ Email Sent!';
        } else {
          showAlert(data.message);
          btn.disabled = false;
          btn.innerHTML = 'Send Reset Link';
        }
      } catch {
        showAlert('Connection error. Please try again.');
        btn.disabled = false;
        btn.innerHTML = 'Send Reset Link';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendResetLink();
    });
  </script>
</body>
</html>
