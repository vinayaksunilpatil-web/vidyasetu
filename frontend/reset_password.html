<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — VidyaSetu</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(150deg, var(--green-900) 0%, var(--green-700) 50%, var(--teal-600) 100%);
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: var(--radius-xl);
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: var(--green-50);
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
    }

    .title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <div class="title">Reset Password</div>
    <div class="subtitle">Enter your new password below</div>

    <div id="formAlert"></div>

    <div class="form-group" style="text-align:left;">
      <label class="form-label">New Password</label>
      <div style="position:relative;">
        <input type="password" class="form-control" id="password"
          placeholder="Enter new password (min 6 characters)">
        <span class="toggle-pass" onclick="togglePwd('password', 'icon1')"
          id="icon1">👁</span>
      </div>
    </div>

    <div class="form-group" style="text-align:left;">
      <label class="form-label">Confirm Password</label>
      <div style="position:relative;">
        <input type="password" class="form-control" id="confirmPassword"
          placeholder="Confirm your new password">
        <span class="toggle-pass" onclick="togglePwd('confirmPassword', 'icon2')"
          id="icon2">👁</span>
      </div>
    </div>

    <button class="btn btn-primary btn-full btn-lg"
      onclick="resetPassword()" id="resetBtn">
      Update Password
    </button>

    <div style="text-align:center; margin-top:20px; font-size:14px;">
      <a href="/login" style="color:var(--green-700); font-weight:600;">
        Back to Login
      </a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('formAlert').innerHTML =
        '<div class="alert alert-error">Invalid or expired reset link. <a href="/forgot-password">Request a new one.</a></div>';
      document.getElementById('resetBtn').disabled = true;
    }

    function togglePwd(fieldId, iconId) {
      const field = document.getElementById(fieldId);
      const icon = document.getElementById(iconId);
      field.type = field.type === 'password' ? 'text' : 'password';
      icon.textContent = field.type === 'password' ? '👁' : '🙈';
    }

    function showAlert(msg, type = 'error') {
      document.getElementById('formAlert').innerHTML =
        `<div class="alert alert-${type === 'error' ? 'error' : 'success'}">${msg}</div>`;
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('resetBtn');

      if (!password || !confirmPassword) {
        showAlert('Please fill in both fields.');
        return;
      }
      if (password.length < 6) {
        showAlert('Password must be at least 6 characters.');
        return;
      }
      if (password !== confirmPassword) {
        showAlert('Passwords do not match.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Updating...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (data.success) {
          showAlert('✅ Password updated successfully! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = '/login', 2000);
        } else {
          showAlert(data.message);
          btn.disabled = false;
          btn.innerHTML = 'Update Password';
        }
      } catch {
        showAlert('Connection error. Please try again.');
        btn.disabled = false;
        btn.innerHTML = 'Update Password';
      }
    }
  </script>
</body>
</html>
